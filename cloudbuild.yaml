# Substitution variables — set these on the Cloud Build trigger in GCP Console:
#   _GEMINI_API_KEY              → your Gemini API key
#   _NEXT_PUBLIC_GOOGLE_MAPS_API_KEY → Google Maps JS API key (baked into bundle)
#   _NEXT_PUBLIC_MAPBOX_TOKEN    → Mapbox GL token (baked into bundle)
#   _NEXT_PUBLIC_PROPA_BACKEND_BASE → backend URL (baked into bundle)
substitutions:
  _GEMINI_API_KEY: ''
  _NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ''
  _NEXT_PUBLIC_MAPBOX_TOKEN: ''
  _NEXT_PUBLIC_PROPA_BACKEND_BASE: 'https://propabridge-api-gateway-480235407496.us-central1.run.app'

steps:
  # Build the container image — NEXT_PUBLIC_* vars must be passed as build args
  # so Next.js inlines them into the JS bundle at compile time.
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/propabridge-dashboard/propabridge-dashboard:$COMMIT_SHA'
      - '--build-arg'
      - 'NEXT_PUBLIC_GOOGLE_MAPS_API_KEY=$_NEXT_PUBLIC_GOOGLE_MAPS_API_KEY'
      - '--build-arg'
      - 'NEXT_PUBLIC_MAPBOX_TOKEN=$_NEXT_PUBLIC_MAPBOX_TOKEN'
      - '--build-arg'
      - 'NEXT_PUBLIC_PROPA_BACKEND_BASE=$_NEXT_PUBLIC_PROPA_BACKEND_BASE'
      - '.'
  
  # Push the container image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-central1-docker.pkg.dev/$PROJECT_ID/propabridge-dashboard/propabridge-dashboard:$COMMIT_SHA']
  
  # Deploy container image to Cloud Run
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'propabridge-dashboard'
      - '--image'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/propabridge-dashboard/propabridge-dashboard:$COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--max-instances'
      - '20'
      - '--min-instances'
      - '0'
      - '--update-env-vars'
      - 'GEMINI_API_KEY=$_GEMINI_API_KEY,GEMINI_AI_REWRITE_MODEL=gemini-2.5-flash'

images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/propabridge-dashboard/propabridge-dashboard:$COMMIT_SHA'
