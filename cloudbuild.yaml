# Set `_GEMINI_API_KEY` on the Cloud Build trigger (or pass --substitutions on submit)
# so Cloud Run receives the same key as api-gateway (`GEMINI_API_KEY` there).
substitutions:
  _GEMINI_API_KEY: ''

steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'us-central1-docker.pkg.dev/$PROJECT_ID/propabridge-dashboard/propabridge-dashboard:$COMMIT_SHA', '.']
  
  # Push the container image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-central1-docker.pkg.dev/$PROJECT_ID/propabridge-dashboard/propabridge-dashboard:$COMMIT_SHA']
  
  # Deploy container image to Cloud Run
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'propabridge-dashboard'
      - '--image'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/propabridge-dashboard/propabridge-dashboard:$COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--max-instances'
      - '20'
      - '--min-instances'
      - '0'
      - '--update-env-vars'
      - 'GEMINI_API_KEY=$_GEMINI_API_KEY,GEMINI_AI_REWRITE_MODEL=gemini-2.5-flash'

images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/propabridge-dashboard/propabridge-dashboard:$COMMIT_SHA'
