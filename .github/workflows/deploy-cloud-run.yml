# Deploy propabridge-dashboard (agency) to Google Cloud Run on push to main.
#
# GitHub repository secrets (Settings → Secrets and variables → Actions):
#   GCP_PROJECT_ID              — Google Cloud project ID (e.g. my-project-123)
#   GCP_REGION                  — Cloud Run / Artifact Registry region (e.g. us-central1)
#   GCP_SERVICE_NAME            — Cloud Run service name (e.g. propabridge-dashboard)
#   WORKLOAD_IDENTITY_PROVIDER  — Full WIF provider resource name:
#       projects/PROJECT_NUMBER/locations/global/workloadIdentityPools/POOL_NAME/providers/PROVIDER_NAME
#   SERVICE_ACCOUNT_EMAIL       — Deployer service account email (e.g. github-deploy@PROJECT_ID.iam.gserviceaccount.com)
#   GEMINI_API_KEY              — Google AI Studio / Gemini key (listing AI rewrite + enhance-image; same as backend)
#
# IAM (summary): GitHub OIDC → WIF pool/provider → allow SA to act as itself; grant that SA:
#   roles/run.admin, roles/iam.serviceAccountUser (on Cloud Run runtime SA), roles/artifactregistry.writer
#   (or roles/storage.admin if using GCR). Enable APIs: run.googleapis.com, artifactregistry.googleapis.com.
#
# Artifact Registry: create Docker repository "propabridge-dashboard" (image path below must match), or change IMAGE_URI.

name: Deploy to Cloud Run

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      # Must match an Artifact Registry Docker repo in GCP_PROJECT_ID (see cloudbuild.yaml).
      AR_REPO: propabridge-dashboard
      AR_IMAGE: propabridge-dashboard

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.SERVICE_ACCOUNT_EMAIL }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker "${{ secrets.GCP_REGION }}-docker.pkg.dev" --quiet

      - name: Build and push container image
        run: |
          IMAGE_URI="${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.AR_IMAGE }}:${{ github.sha }}"
          docker build -t "${IMAGE_URI}" .
          docker push "${IMAGE_URI}"
          echo "IMAGE_URI=${IMAGE_URI}" >> "$GITHUB_ENV"

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ secrets.GCP_SERVICE_NAME }}
          region: ${{ secrets.GCP_REGION }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          image: ${{ env.IMAGE_URI }}
          # Align with cloudbuild.yaml defaults (adjust if service needs auth/env/CPU).
          env_vars: |
            GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
            GEMINI_AI_REWRITE_MODEL=gemini-2.5-flash
          flags: >-
            --allow-unauthenticated
            --max-instances=20
            --min-instances=0
            --platform=managed
